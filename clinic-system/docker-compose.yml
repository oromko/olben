version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: clinic_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-clinic123}
      MYSQL_DATABASE: ${DB_NAME:-family_clinic}
      MYSQL_USER: ${DB_USER:-clinic_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-clinic123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - clinic_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clinic_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_USER: ${DB_USER:-clinic_user}
      DB_PASSWORD: ${DB_PASSWORD:-clinic123}
      DB_NAME: ${DB_NAME:-family_clinic}
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - clinic_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clinic_frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - clinic_network

volumes:
  mysql_data:
    driver: local

networks:
  clinic_network:
    driver: bridge
